name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (PyQt6 headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 vlc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" .

      - name: Lint with ruff
        run: ruff check src/

      - name: Smoke test — import core modules
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -c "from smart_radio_pro.core import config, theme, equalizer; print('Core modules OK')"

      - name: Smoke test — player module
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -c "from smart_radio_pro.core.player import RadioPlayer; print('Player OK')"

      - name: List Python source files
        run: find src -name "*.py" -type f | sort